<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCMP - All Files</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/dir.css">
    <link rel="stylesheet" href="/css/table.css">
</head>

<body>
    <script src="/js/lib/init/sidebar.js"></script>

    <div id="sidebar-placeholder" class="sidebar"></div>

    <div class="content">
        <h1>Files</h1>

        <!-- Table wrapper -->
        <div class="table-container card-panel">
            <div class="table-header">
                <span id="current-path">Path: /</span>

                <div class="search-group">
                    <div class="search-input-wrapper">
                        <input id="search-input" type="text" placeholder="Search..." class="search-input input-field" />
                        <button id="search-cog" class="search-cog" type="button"
                            title="Search options">⚙️</button>
                    </div>
                    <button id="search-btn" class="btn" type="button">Search</button>
                    <button id="clear-search-btn" class="btn" type="button">Clear</button>
                </div>

                <!-- Control button/dropdown -->
                <div class="table-controls flex-row">
                    <button id="create-btn" class="btn" type="button">Create</button>
                    <button id="refresh-btn" class="btn" type="button">Refresh</button>
                    <div class="rows-per-page">
                        <label for="rows-select">Rows</label>
                        <select id="rows-select" class="btn">
                            <option value="10" selected>10</option>
                            <option value="25">25</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                        </select>
                    </div>
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Permissions</th>
                        <th>Owner</th>
                        <th>Group</th>
                        <th>Size</th>
                        <th>Last Modified</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="file-tbody">
                    <!-- Dynamic content will be inserted here -->
                </tbody>
            </table>

            <!-- Pagination controls -->
            <div id="pagination" class="pagination">
                <button id="pagination-prev" class="btn" type="button" disabled>&laquo; Prev</button>
                <span id="pagination-info" class="page-info">Page 1 of 1</span>
                <button id="pagination-next" class="btn" type="button">Next &raquo;</button>
            </div>
        </div>
    </div>
    <script type="module" src="/js/dir.js"></script>
</body>

</html>
