<!DOCTYPE HTML>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCMP - Repository</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/repository.css">
  <link rel="stylesheet" href="/css/table.css">
</head>

<body>

  <div class="sidebar">
    <select id="repo-select" class="sidebar-header">
      <option value="repo1">Loading...</option>
    </select>
    <div id="sidebar-content">
      <ul>
        <li><a href="/index.html">Home</a></li>
        <li><a href="/dir.html">Files</a></li>
        <li><a href="/repository.html">Repository</a></li>
        <li><a href="/deployments.html">Deployments</a></li>
        <li><a href="/seed.html">Seeding</a></li>
        <li><a href="/settings.html">Settings</a></li>
      </ul>
      <div class="logout-link">
        <form action="/login.html" method="GET">
          <button type="submit">Logout</button>
        </form>
      </div>
    </div>
    <div class="sidebar-footer">
      <div id="version-info">Loading...</div>
      <div id="platform-info">Loading...</div>
      <div id="api-browser">
        <a href="/" target="_blank">API Browser</a>
      </div>
      <div id="github-link">
        <a href="/" target="_blank">GitHub Project Page</a>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="git-ui-container flex-col gap-8">
      <h1>Repository Status</h1>

      <div class="git-panels flex-row flex-wrap gap-8">
        <!-- Unstaged Panel -->
        <div class="git-panel card-panel unstaged-panel">
          <h2 class="panel-title">Unstaged Changes</h2>
          <div class="btn-row flex-row justify-between align-center mb-4">
            <button id="btn-stage-all" class="btn small btn-stage" type="button">Stage All</button>
            <button id="btn-stage-refresh" class="btn small btn-refresh" type="button">Refresh</button>
          </div>
          <ul id="unstaged-list" class="git-file-list">
            <!-- Dynamic -->
          </ul>
        </div>

        <!-- Staged Panel -->
        <div class="git-panel card-panel staged-panel">
          <h2 class="panel-title">Staged Changes</h2>
          <button id="btn-unstage-all" class="btn small btn-unstage" type="button">Unstage All</button>
          <ul id="staged-list" class="git-file-list">
            <!-- Dynamic -->
          </ul>
        </div>
      </div>

      <!-- Commit Box -->
      <div class="git-panel card-panel commit-box">
        <h2 class="panel-title">Create Commit</h2>
        <label for="commit-message" class="commit-label">Commit Message:</label>
        <textarea id="commit-message" class="commit-textarea input-field" placeholder="Describe your changes..."></textarea>
        <div class="commit-actions flex-row gap-4">
          <button id="commit-button" class="btn" type="button" disabled>Commit</button>
          <button id="commit-deploy-button" class="btn" type="button" disabled>Commit and Deploy</button>
        </div>
      </div>

      <!-- Commit History Table -->
      <div id="commit-history-table" class="table-container card-panel">
        <h2 class="table-header">
          <p>Past Commits</p>

          <div class="rows-per-page">
            <label for="rows-select">Rows</label>
            <select id="rows-select" class="btn">
              <option value="10" selected>10</option>
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </div>
        </h2>
        <table>
          <thead>
            <tr>
              <th>Hash</th>
              <th>Date</th>
              <th>Author</th>
              <th>Changes</th>
              <th>Message</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <!-- Dynamic -->
          </tbody>
        </table>

        <!-- Pagination controls -->
        <div class="pagination">
          <button id="pagination-prev" class="btn" type="button" disabled>&laquo; Prev</button>
          <span class="page-info">Page 1 of 1</span>
          <button id="pagination-next" class="btn" type="button">Next &raquo;</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/js/repo.js"></script>
</body>

</html>
