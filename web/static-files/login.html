<!DOCTYPE HTML>
<html lang="en">

<head>
  <title>SCMP - Login</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <style>
    * {
      margin: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      font-family: Arial, sans-serif;
      background: #121212;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-panel {
      background: #1f1f1f;
      padding: 2rem;
      text-align: center;
    }

    .login-panel h2 {
      margin-bottom: 1.5rem;
    }

    .login-input,
    .btn {
      width: 100%;
      font-size: 1rem;
      padding: 0.5rem;
      margin-bottom: 1rem;
      color: #fff;
      background: #2a2a2a;
      border: 1px solid #444;
    }

    .btn {
      background: #333;
      border: none;
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      color: white;
      text-align: center;
      user-select: none;
      display: inline-block;
      border-radius: 4px;
    }

    .btn:hover {
      background: #444;
    }

    #accessDeniedPopup {
      display: none;
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #b00020;
      color: white;
      padding: 1rem 2rem;
      border-radius: 5px;
      font-weight: bold;
      box-shadow: 0 2px 10px rgba(176, 0, 32, 0.8);
      z-index: 1000;
      animation: fadeInOut 3s forwards;
    }

    @keyframes fadeInOut {
      0% {
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        opacity: 0;
      }
    }
  </style>
</head>

<body>
  <div class="login-panel">
    <h2>SCMP</h2>
    <div id="loginForm">
      <input type="text" id="username" name="username" placeholder="Username" class="login-input" required />
      <input type="password" id="password" name="password" placeholder="Password" class="login-input" required />
      <button id="loginBtn" class="btn" type="button">Login</button>
    </div>
  </div>
  <div id="accessDeniedPopup">Access Denied</div>
  <script type="module" src="/js/login.js"></script>
</body>

</html>
