<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{STATUSCODE} - {SHORTSTATUSDESCRIPTION}</title>
  <style>
    * {
      margin: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .error-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #1a1a1a;
      padding: 2rem;
      width: 90%;
      max-width: 600px;
      border: 1px solid #333;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    h1 small {
      font-size: 1rem;
      color: #aaa;
    }

    .divider {
      width: 60%;
      height: 1px;
      background-color: #333;
      margin: 1.5rem 0;
    }

    p {
      font-size: 1rem;
      color: #ccc;
      line-height: 1.6;
      margin-bottom: 1rem;
      max-width: 90%;
    }

    #error-description {
      color: #bbb;
    }

    #full-error {
      color: #888;
      font-size: 0.9rem;
      word-break: break-word;
    }
  </style>
</head>

<body>
  <div class="error-container">
    <h1>{SHORTSTATUSDESCRIPTION} <br><small>(HTTP {STATUSCODE})</small></h1>
    <div class="divider"></div>
    <p id="error-description">{ERRORDESCRIPTION}</p>
    <div class="divider"></div>
    <p id="full-error">{FULLERROR}</p>
  </div>
</body>

</html>
